{% extends "base.html" %}

{% block title %}{{ tienda.nombre_tienda }}{% endblock %}

{% block content %}

<section class="tienda-detalle">

    <div id="tienda"></div>

    <div class="productos-seccion">
        <h2>Productos disponibles</h2>
        <div id="productos" class="productos-grid"></div>
    </div>

</section>

<script>
async function cargarTienda() {

    const id = window.location.pathname.split("/").pop(); //Get store if from URL

    try {
        //Load store
    const resTienda = await fetch(`http://127.0.0.1:5000/api/tiendas/${id}`);

    if (!resTienda.ok) {
        throw new Error("Error cargando tienda");
    }

    const tienda = await resTienda.json();

    let imagen = "tienda_portada.jpg";

    try {
        const imgs = JSON.parse(tienda.imagenes);
        if (Array.isArray(imgs) && imgs.length > 0) {
            imagen = imgs[0];
        }
    } catch (e) {
        console.log("Error parseando imágenes:", e);
    }

    document.getElementById("tienda").innerHTML = `
        <img
            src="/static/img/${imagen}"
            class="tienda-portada"
        >
        <div class="tienda-info">
            <h1>${tienda.nombre_tienda}</h1>

            <p>📍 ${tienda.direccion_tienda}</p>

            <p>
                🕒 ${tienda.horario || 'Horario no disponible'}
            </p>
        </div>
    `;

        //Load products

        const resProductos = await fetch(
            `http://127.0.0.1:5000/api/productos/tienda/${id}`
        );

        if (!resProductos.ok) {
            throw new Error("Error cargando productos");
        }

        const productos = await resProductos.json();

        const contenedor = document.getElementById("productos");

        //If teher are no products

        if (!productos.length) {

            contenedor.innerHTML = `
                <p class="sin-productos">
                    No hay productos disponibles actualmente.
                </p>
            `;

            return;
        }

        //Rednder products

        contenedor.innerHTML = productos.map(p => `

            <div class="producto-card">

                <img
                    src="/static/img/${p.imagen_producto || 'pordefecto.png'}"
                    alt="${p.nombre}"
                    class="producto-img"
                >

                <div class="producto-card-body">

                    <h4>${p.nombre}</h4>

                    <p class="producto-descripcion">
                        ${p.descripcion || 'Sin descripción'}
                    </p>

                    <p class="producto-info">
                        🌱 ${p.peso_kg || 0} kg salvados
                    </p>

                    <button
                        class="boton-agregar"
                        onclick='agregarAlCarrito(${JSON.stringify(p)})'
                    >
                        + Añadir al carrito
                    </button>

                </div>

            </div>

        `).join("");

    } catch (err) {

        console.error(err);

        document.getElementById("productos").innerHTML = `
            <p class="error-carga">
                Error cargando tienda o productos.
            </p>
        `;
    }
}

cargarTienda();
</script>

{% endblock %}
